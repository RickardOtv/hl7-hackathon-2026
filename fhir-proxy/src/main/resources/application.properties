# Default port (overridden by PROXY_PORT env var via ProxyApp.main).
server.port=8181

# Don't have Spring intercept HAPI's FHIR error responses.
server.error.whitelabel.enabled=false

# Static resources at /  (this is the Spring Boot default — restated for clarity).
spring.web.resources.static-locations=classpath:/static/

# Quieter startup.
spring.main.banner-mode=off
logging.level.org.springframework=WARN
logging.level.org.eclipse.jetty=WARN
